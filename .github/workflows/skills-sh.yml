name: Verify skills.sh deployment

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skills-sh-deployment
  cancel-in-progress: true

jobs:
  verify:
    name: Install and verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install published skills
        run: npx skills add danangjoyoo/nerd --all

      - name: Verify skills.sh listing
        run: curl --fail --location --retry 3 --retry-all-errors https://skills.sh/danangjoyoo/nerd > /dev/null
