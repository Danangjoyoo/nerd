name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check Python syntax
        run: python3 -m compileall -q scripts benchmarks tests
      - name: Run unit and contract tests
        run: python3 -m unittest discover -s tests -v
      - name: Validate public skills
        run: python3 scripts/validate_skills.py
      - name: Verify Skills CLI discovery
        run: npx skills add . --list
      - name: Verify benchmark schedule
        run: python3 benchmarks/run.py plan --config benchmarks/config.json
      - name: Verify README benchmark evidence
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="$(sed -n 's/<!-- BENCHMARK_RUN:\([^ ]*\) -->/\1/p' README.md)"
          test -n "$RUN_ID"
          if [ "$RUN_ID" = "pending" ]; then
            grep -F "Benchmark results pending a complete release run." README.md
          else
            python3 benchmarks/run.py publish \
              --results "benchmarks/results/$RUN_ID" \
              --readme README.md \
              --allow-historical \
              --check
          fi
